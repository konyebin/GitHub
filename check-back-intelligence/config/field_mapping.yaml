# Install Base → Check Back column mapping
install_base_to_checkback:
  Account Name: Opportunity Name
  Collab AOV: "TCV $"
  Partner Name: Partner
  Subscription Ref Id: "Sub #"
  CSM_NAME: "CSM name"
  SFDC_OPPORTUNITY_NAME: "Opportunity (linked)"
  Lifecycle Stage_Current: "Notes from provisioned features"
  Risk2_0_current: " (G/Y/R)"

risk_to_gyr:
  Low: G
  Medium: Y
  High: R
  Unknown: ""

# Fields requiring manual review when mapped from install base
review_flags:
  "Term End Date": "Sub start date (MM/DD/YYYY)"
  "Webex Calling MT Provisioned Seats": "Providioned Lic Calling"
  "Webex Calling DI Provisioned Seats": "Providioned Lic Calling"
  "Cloud Calling Billed Seats": "Entitled Lic Calling"
  "Total Billed Seats": "Entitled Lic Calling"

# PDF filename patterns → extractor + target fields
pdf_patterns:
  - pattern: "(?i)opportunity.*salesforce"
    extractor: opportunity
    fields: [Opportunity Name, "TCV $", Partner, "Closed on (MM/YY)", Competitor]
  - pattern: "(?i)subscription.*workbench"
    extractor: subscription
    fields: ["Sub #", "Sub start date (MM/DD/YYYY)", "Entitled Lic Calling"]
  - pattern: "(?i)accountinfo"
    extractor: accountinfo
    fields: ["Customer org id"]
  - pattern: "(?i)calling_cdr|calling"
    extractor: calling
    fields: ["Active Lic Calling", "Notes from Calling Analytics"]
  - pattern: "(?i)devices"
    extractor: devices
    fields: ["Add-ons included or not"]
  - pattern: "(?i)meetings|messaging|wrkspace"
    extractor: collaboration
    fields: ["Notes from provisioned features"]
  - pattern: "(?i)success.?portal|cloud collaboration"
    extractor: success_portal
    fields: ["CSM Engagement Model (linked)", "CSM name"]
  - pattern: "(?i)genuineparts"
    extractor: summary
    fields: [Opportunity Name, "Customer org id"]

